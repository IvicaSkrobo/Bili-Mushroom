name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-website.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Type-check website
        run: npx tsc -p website/tsconfig.json --noEmit

      - name: Build website
        run: npm run website:build
        env:
          VITE_GISCUS_REPO: ${{ vars.VITE_GISCUS_REPO }}
          VITE_GISCUS_REPO_ID: ${{ vars.VITE_GISCUS_REPO_ID }}
          VITE_GISCUS_CATEGORY: ${{ vars.VITE_GISCUS_CATEGORY }}
          VITE_GISCUS_CATEGORY_ID: ${{ vars.VITE_GISCUS_CATEGORY_ID }}
          VITE_BUG_REPORT_URL: ${{ vars.VITE_BUG_REPORT_URL }}
          VITE_DONATE_URL: ${{ vars.VITE_DONATE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
