name: Build Windows Installer

# Triggers:
#   - Manually from GitHub → Actions tab (workflow_dispatch)
#   - Automatically when you push a version tag like: git tag v0.2.0 && git push --tags
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      # ---------------------------------------------------------------
      # TAG PUSH → build + create GitHub Release with installer attached
      # ---------------------------------------------------------------
      - name: Build and publish release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bili Mushroom ${{ github.ref_name }}'
          releaseBody: |
            ## Bili Mushroom ${{ github.ref_name }}

            ### Install
            Download **Bili-Mushroom_*_x64-setup.exe** below and run it.
            Windows will ask for confirmation — click "More info → Run anyway" if it appears.

            ### Update
            If you have a previous version installed, just run the new installer over it.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      # ---------------------------------------------------------------
      # MANUAL TRIGGER → build only, download installer from Artifacts
      # Go to the finished run → scroll down → download Bili-Mushroom-installer
      # ---------------------------------------------------------------
      - name: Build only (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer as artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Bili-Mushroom-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
