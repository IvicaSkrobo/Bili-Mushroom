name: Bug report
description: Report a problem in Gljivobook / Mushroom Book.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so it can be reproduced.
  - type: input
    id: version
    attributes:
      label: App version
      description: You can find this in Settings.
      placeholder: v0.2.28
  - type: dropdown
    id: language
    attributes:
      label: App language
      options:
        - Croatian
        - English
        - Other
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: When I click...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Drag screenshots here, or paste console/log text if you have it.
  - type: checkboxes
    id: data-safety
    attributes:
      label: Data safety
      options:
        - label: I did not attach private location/photo data unless I intentionally wanted to share it.
          required: true
