name: Feature idea
description: Suggest an idea users can discuss or vote on.
title: "[Idea]: "
labels: ["idea"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What should Gljivobook / Mushroom Book do?
      placeholder: It would be useful if...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is it useful?
      description: Describe the real field/workflow problem this solves.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Collection
        - Species
        - Map
        - Statistics
        - PDF export
        - Import/photos
        - Website/community
        - Other
