<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="/favicon.ico" />
    <title>Gljivobook</title>
    <style>
      html {
        background: #101827;
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101827;
        color: #ede9dc;
      }

      #root {
        min-height: 100vh;
        background: #101827;
      }

      html:not(.dark) {
        background: #f2efe2;
        color-scheme: light;
      }

      html:not(.dark) body,
      html:not(.dark) #root {
        background: #f2efe2;
        color: #3c3127;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #101827;
        color: #ede9dc;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      html:not(.dark) .boot-screen {
        background: #f2efe2;
        color: #3c3127;
      }

      .boot-card {
        width: min(24rem, calc(100vw - 3rem));
        text-align: center;
      }

      .boot-mark {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        display: grid;
        place-items: center;
        border: 1px solid rgba(214, 151, 52, 0.45);
        border-radius: 0.5rem;
        background: rgba(255, 255, 255, 0.05);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2rem;
        color: #d69b35;
      }

      html:not(.dark) .boot-mark {
        background: rgba(255, 255, 255, 0.52);
        color: #a75f1b;
      }

      .boot-kicker {
        margin: 0 0 0.5rem;
        font-size: 0.68rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        opacity: 0.72;
      }

      .boot-title {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-size: 2.7rem;
        font-style: italic;
        line-height: 1;
        font-weight: 600;
      }

      .boot-status {
        margin: 2rem auto 0;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(150, 138, 110, 0.45);
        border-radius: 0.5rem;
        background: rgba(255, 255, 255, 0.045);
        font-size: 0.9rem;
      }

      html:not(.dark) .boot-status {
        background: rgba(255, 255, 255, 0.5);
      }

      .boot-bar {
        height: 0.25rem;
        margin-top: 0.75rem;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(150, 138, 110, 0.25);
      }

      .boot-bar::before {
        content: "";
        display: block;
        height: 100%;
        width: 50%;
        border-radius: inherit;
        background: #d69b35;
        animation: boot-progress 1.4s ease-in-out infinite;
      }

      @keyframes boot-progress {
        from { transform: translateX(-110%); }
        to { transform: translateX(220%); }
      }
    </style>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('bili_theme');
          if (theme !== 'light') document.documentElement.classList.add('dark');
        } catch {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card">
          <div class="boot-mark">G</div>
          <p class="boot-kicker">Personal mycology journal</p>
          <h1 class="boot-title">Gljivobook</h1>
          <div class="boot-status">
            Opening local library...
            <div class="boot-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
