<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Bili Mushroom</title>
    <style>
      html {
        background: #101827;
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101827;
        color: #ede9dc;
      }

      #root {
        min-height: 100vh;
        background: #101827;
      }
    </style>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('bili_theme');
          if (theme !== 'light') document.documentElement.classList.add('dark');
        } catch {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
